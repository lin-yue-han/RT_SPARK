# ================================================================
# frps.ini - frp 服务端配置（运行在公网节点上）
#
# 部署位置：任何有公网 IP 的机器（学校服务器/云主机试用/朋友电脑）
# 下载地址：https://github.com/fatedier/frp/releases
#
# 启动命令：./frps -c frps.ini
# ================================================================

[common]
# frp 服务端监听端口（Air778E 连接这个端口）
bind_port = 7000

# 认证 token（客户端必须一致，防止未授权连接）
token = rt_spark_2024

# 仪表盘（可选，浏览器访问可查看连接状态）
dashboard_port = 7500
dashboard_user = admin
dashboard_pwd = spark123

# 日志
log_level = info
log_max_days = 3
