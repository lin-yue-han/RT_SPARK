# ================================================================
# frpc.ini - frp 客户端配置（运行在你的电脑上）
#
# 作用：将公网节点收到的 Air778E 连接转发到本地 TCP Server (bridge.js)
#
# 下载地址：https://github.com/fatedier/frp/releases
# 启动命令：./frpc -c frpc.ini
#
# !!! 需要修改 !!!
#   server_addr = 你的公网节点 IP
# ================================================================

[common]
# --- 必须修改：你的公网节点 IP ---
server_addr = xxx.xxx.xxx.xxx

# 公网节点上 frps 监听的端口
server_port = 7000

# 认证 token（必须与 frps.ini 一致）
token = rt_spark_2024

# 日志
log_level = info
log_max_days = 3

# ================================================================
# TCP 代理：将 Air778E 的连接转发到本地 bridge.js
# ================================================================
[rt_spark_tcp]
# 代理类型
type = tcp

# Air778E 连接的公网端口（Air778E AT 指令中的目标端口）
remote_port = 8090

# 转发到本地的地址和端口（bridge.js 的 TCP Server）
local_ip = 127.0.0.1
local_port = 8090

# ================================================================
# 可选：WebSocket 代理（如果想从外网访问网页）
# 不需要时注释掉
# ================================================================
# [rt_spark_ws]
# type = tcp
# remote_port = 8080
# local_ip = 127.0.0.1
# local_port = 8080
